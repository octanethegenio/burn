name: Build cross-platform beta

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - windows-latest
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: python -m pip install --disable-pip-version-check -r requirements.txt -r requirements-build.txt
      - run: python -m unittest discover -s tests -v
      - run: python scripts/package.py
      - uses: actions/upload-artifact@v4
        with:
          name: burn-${{ matrix.runner }}
          path: release/*
          if-no-files-found: error
